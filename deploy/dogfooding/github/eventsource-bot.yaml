# EventSource for receiving GitHub webhooks.
# GitHub sends webhooks to this endpoint, which are then published to the EventBus.
apiVersion: argoproj.io/v1alpha1
kind: EventSource
metadata:
  name: github-bot
spec:
  service:
    ports:
      - port: 12000
        targetPort: 12000
  github:
    kubeopencode:
      # Repository configuration
      repositories:
        - owner: kubeopencode
          names:
            - kubeopencode
      # Webhook endpoint configuration
      webhook:
        endpoint: /webhooks/github
        port: "12000"
        method: POST
      # Events to listen for
      # Only pull_request is needed: PR opened (auto review) + review_requested
      events:
        - pull_request
      # Webhook secret for HMAC validation (X-Hub-Signature-256)
      webhookSecret:
        name: github-webhook-secret
        key: hmacKey
      # Content type
      contentType: json
      # Active state
      active: true
      # Disable SSL verification for self-signed certs (smee.io forwarding)
      insecure: false
