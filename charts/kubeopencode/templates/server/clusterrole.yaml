{{- if .Values.server.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kubeopencode.fullname" . }}-server
  labels:
    {{- include "kubeopencode.server.labels" . | nindent 4 }}
rules:
# Read access to KubeOpenCode resources
- apiGroups: ["kubeopencode.io"]
  resources: ["tasks", "agents", "agenttemplates", "kubeopencodeconfigs"]
  verbs: ["get", "list", "watch"]
# Write access to Tasks (create, delete, patch for stop annotation)
- apiGroups: ["kubeopencode.io"]
  resources: ["tasks"]
  verbs: ["create", "delete", "patch"]
# Read access to Pods (for status and log streaming)
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]
# Read access to Pod logs
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
# Exec into Pods (required for web terminal to agent server pods)
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# Read access to Namespaces (for namespace listing)
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
{{- if .Values.server.auth.enabled }}
# Impersonation (required when auth is enabled for per-user RBAC enforcement)
- apiGroups: [""]
  resources: ["users", "groups", "serviceaccounts"]
  verbs: ["impersonate"]
# TokenReview for Bearer token authentication
- apiGroups: ["authentication.k8s.io"]
  resources: ["tokenreviews"]
  verbs: ["create"]
{{- end }}
{{- end }}
